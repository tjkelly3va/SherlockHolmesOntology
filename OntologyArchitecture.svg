<svg width="100%" viewBox="0 0 680 740" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; }
  .title { font-size: 16px; font-weight: 500; }

  /* Light mode (default) */
  .fill-teal { fill: #E1F5EE; stroke: #0F6E56; }
  .text-teal { fill: #085041; }
  .text-teal-sub { fill: #0F6E56; }
  .fill-purple { fill: #EEEDFE; stroke: #534AB7; }
  .text-purple { fill: #3C3489; }
  .text-purple-sub { fill: #534AB7; }
  .fill-coral { fill: #FAECE7; stroke: #993C1D; }
  .text-coral { fill: #712B13; }
  .text-coral-sub { fill: #993C1D; }
  .fill-amber { fill: #FAEEDA; stroke: #854F0B; }
  .text-amber { fill: #633806; }
  .text-amber-sub { fill: #854F0B; }
  .fill-pink { fill: #FBEAF0; stroke: #993556; }
  .text-pink { fill: #72243E; }
  .text-pink-sub { fill: #993556; }
